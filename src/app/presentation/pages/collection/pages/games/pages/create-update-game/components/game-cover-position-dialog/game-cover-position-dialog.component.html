<h2 retroDialogTitle>{{ 'gameForm.cover.repositionTitle' | transloco }}</h2>

<div retroDialogContent>
  <div
    class="cover-pos-dialog__preview"
    [class.cover-pos-dialog__preview--grabbing]="isDragging()"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (pointercancel)="onPointerUp()"
    (wheel)="onWheel($event)"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="onTouchEnd($event)">
    <img
      class="cover-pos-dialog__image"
      [ngSrc]="config.imageUrl"
      width="240"
      height="135"
      ngSrcset="1920w"
      priority
      [style.object-position]="positionCss()"
      [style.transform]="transformCss()"
      [style.transform-origin]="positionCss()"
      (load)="onImageLoad($event)"
      alt="" />
  </div>
  <p class="cover-pos-dialog__hint">{{ 'cropDialog.hint' | transloco }}</p>
</div>

<footer retroDialogActions align="end">
  <retro-button [label]="'common.cancel' | transloco" variant="ghost" (clicked)="onCancel()" />
  <retro-button
    [label]="'common.confirm' | transloco"
    variant="primary"
    [disabled]="!imageLoaded()"
    (clicked)="onConfirm()" />
</footer>
