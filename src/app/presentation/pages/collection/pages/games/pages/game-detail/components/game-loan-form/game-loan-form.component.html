<div class="game-loan-form">
  <!-- Header -->
  <div class="game-loan-form__header">
    <retro-icon-button
      icon="arrow_back"
      [ariaLabel]="'common.back' | transloco"
      class="game-loan-form__back-btn"
      (clicked)="onCancel()" />
    <h2 class="game-loan-form__title">{{ 'gameDetail.loan.title' | transloco }}</h2>
  </div>

  @if (isLoaned()) {
    <!-- Return mode: active loan info -->
    <section class="game-loan-form__section">
      <h3 class="game-loan-form__section-title">{{ 'gameDetail.loan.activeSection' | transloco }}</h3>

      <div class="game-loan-form__info-row">
        <retro-icon name="person" />
        <span>{{ game().activeLoanTo }}</span>
      </div>
      <div class="game-loan-form__info-row">
        <retro-icon name="calendar_today" />
        <span>{{ game().activeLoanAt }}</span>
      </div>

      <retro-button
        [label]="'gameDetail.loan.returnBtn' | transloco"
        variant="primary"
        class="game-loan-form__action-btn"
        [loading]="returning()"
        [disabled]="returning()"
        (clicked)="onReturn()">
        <retro-icon slot="start" name="undo" size="sm" />
      </retro-button>
    </section>
  } @else {
    <!-- Loan mode: create loan form -->
    <form [formGroup]="form" class="game-loan-form__content">
      <section class="game-loan-form__section">
        <h3 class="game-loan-form__section-title">{{ 'gameDetail.loan.newSection' | transloco }}</h3>

        <retro-input
          class="game-loan-form__field"
          [label]="'gameDetail.loan.loanedTo' | transloco"
          type="text"
          formControlName="loanedTo"
          [placeholder]="'gameDetail.loan.loanedToPlaceholder' | transloco" />

        <retro-datepicker
          class="game-loan-form__field"
          [label]="'gameDetail.loan.loanedAt' | transloco"
          formControlName="loanedAt" />

        <retro-button
          [label]="'gameDetail.loan.loanBtn' | transloco"
          variant="primary"
          class="game-loan-form__action-btn"
          [loading]="saving()"
          [disabled]="saving()"
          (clicked)="onLoan()">
          <retro-icon slot="start" name="handshake" size="sm" />
        </retro-button>
      </section>
    </form>
  }
</div>
