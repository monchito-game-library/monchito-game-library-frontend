name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  retro:
    name: Lint + tests lib retro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Lint lib retro
        run: npm run lint:retro

      - name: Tests lib retro con cobertura
        run: npm run test:retro:coverage

  app:
    name: Build + lint + tests app
    runs-on: ubuntu-latest
    needs: retro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Generar environment.ts
        run: |
          cat > src/environments/environment.ts << 'EOF'
          export const environment = {
            production: false,
            supabase: {
              url: '${{ secrets.SUPABASE_URL }}',
              anonKey: '${{ secrets.SUPABASE_ANON_KEY }}'
            },
            rawg: {
              apiUrl: 'https://api.rawg.io/api',
              apiKey: '${{ secrets.RAWG_API_KEY }}'
            },
            sentry: {
              dsn: '',
              enabled: false,
              release: ''
            }
          };
          EOF

      - name: Build de producción
        run: npm run build

      - name: Ejecutar tests de reglas ESLint
        run: npm run test:eslint-rules

      - name: Lint app
        run: npm run lint:app

      - name: Tests app con cobertura
        run: npm run test:app:coverage
