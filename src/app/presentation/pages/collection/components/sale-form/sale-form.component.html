<div class="sale-form">
  <!-- Header -->
  <div class="sale-form__header">
    <retro-icon-button
      icon="arrow_back"
      [ariaLabel]="'common.back' | transloco"
      class="sale-form__back-btn"
      (clicked)="onCancel()" />
    <h2 class="sale-form__title">{{ i18nPrefix() + '.title' | transloco }}</h2>
  </div>

  <form [formGroup]="form" class="sale-form__content">
    <!-- Section 1: Availability -->
    <section class="sale-form__section">
      <h3 class="sale-form__section-title">{{ i18nPrefix() + '.availability' | transloco }}</h3>

      <div class="sale-form__toggle-row">
        <span class="sale-form__toggle-label">{{ i18nPrefix() + '.forSale' | transloco }}</span>
        <retro-checkbox formControlName="forSale" />
      </div>

      @if (isForSale) {
        <retro-input
          class="sale-form__field"
          [label]="i18nPrefix() + '.salePrice' | transloco"
          type="number"
          min="0"
          step="0.01"
          formControlName="salePrice"
          [placeholder]="i18nPrefix() + '.salePricePlaceholder' | transloco">
          <span retroSuffix class="sale-form__currency">€</span>
        </retro-input>
      }

      <retro-button
        [label]="i18nPrefix() + '.saveBtn' | transloco"
        variant="primary"
        class="sale-form__save-btn"
        [loading]="saving()"
        [disabled]="saving() || selling()"
        (clicked)="onSave()">
        <retro-icon slot="start" name="save" size="sm" />
      </retro-button>
    </section>

    <hr class="retro-divider" />

    <!-- Section 2: Register sale -->
    <section class="sale-form__section">
      <h3 class="sale-form__section-title">{{ i18nPrefix() + '.registerSection' | transloco }}</h3>

      <retro-input
        class="sale-form__field"
        [label]="i18nPrefix() + '.soldPriceFinal' | transloco"
        type="number"
        min="0"
        step="0.01"
        formControlName="soldPriceFinal"
        [placeholder]="i18nPrefix() + '.soldPricePlaceholder' | transloco">
        <span retroSuffix class="sale-form__currency">€</span>
      </retro-input>

      <retro-datepicker
        class="sale-form__field"
        [label]="i18nPrefix() + '.soldAt' | transloco"
        formControlName="soldAt"
        [error]="form.controls.soldAt.hasError('invalidDate') ? (i18nPrefix() + '.soldAtInvalid' | transloco) : null" />

      <p class="sale-form__warning">
        <retro-icon name="warning" />
        {{ i18nPrefix() + '.soldWarning' | transloco }}
      </p>

      <retro-button
        [label]="i18nPrefix() + '.markAsSoldBtn' | transloco"
        variant="danger"
        class="sale-form__sold-btn"
        [loading]="selling()"
        [disabled]="!canMarkAsSold || saving() || selling()"
        (clicked)="onMarkAsSold()">
        <retro-icon slot="start" name="sell" size="sm" />
      </retro-button>
    </section>
  </form>
</div>
