<div
  class="lib-form-field"
  [class.lib-form-field--focused]="focused()"
  [class.lib-form-field--invalid]="invalid()"
  [class.lib-form-field--disabled]="disabled()">
  <ng-content select="retro-label, [retroLabel]" />

  <div class="lib-form-field__control">
    <ng-content select="[retroPrefix]" />
    <ng-content />
    <ng-content select="[retroSuffix]" />
  </div>

  <div class="lib-form-field__subscript">
    @if (invalid()) {
      <ng-content select="retro-error, [retroError]" />
    } @else {
      <ng-content select="retro-hint, [retroHint]" />
    }
  </div>
</div>
