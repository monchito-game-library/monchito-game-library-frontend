<!-- Stats: projected from parent -->
<div class="list-page-header__stats">
  <ng-content />
</div>

<!-- Search and actions -->
<div class="list-page-header__filters">
  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="list-page-header__search">
    <mat-label>{{ searchPlaceholder() | transloco }}</mat-label>
    <span matTextPrefix class="list-page-header__search-prefix">$ </span>
    <input
      matInput
      [value]="searchValue()"
      [disabled]="disabled()"
      (input)="searchChange.emit($any($event.target).value)" />
  </mat-form-field>

  @if (showViewModeBtn()) {
    <app-lib-icon-button
      class="list-page-header__view-btn"
      [icon]="viewMode() === 'grid' ? 'view_list' : 'view_module'"
      [ariaLabel]="'gameList.aria.toggleViewMode' | transloco"
      [disabled]="disabled()"
      (clicked)="viewModeToggle.emit()" />
  }

  @if (showFilterBtn()) {
    <div class="list-page-header__filter-wrap">
      <app-lib-icon-button
        class="list-page-header__filter-btn"
        icon="tune"
        [ariaLabel]="'gameList.filters.filters' | transloco"
        [disabled]="disabled()"
        (clicked)="filterClick.emit()" />
      @if (filterCount() > 0) {
        <span class="list-page-header__filter-badge">{{ filterCount() }}</span>
      }
    </div>
  }

  @if (showAddBtn()) {
    <app-lib-button
      class="list-page-header__add-btn"
      variant="primary"
      icon="add"
      [label]="'nav.add' | transloco"
      [disabled]="disabled()"
      (clicked)="addClick.emit()" />
  }
</div>
