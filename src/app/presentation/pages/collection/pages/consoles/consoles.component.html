<app-hardware-list-shell
  [loading]="loading()"
  [items]="items()"
  [filteredItems]="filteredItems()"
  [totalSpent]="totalSpent()"
  [searchQuery]="searchQuery()"
  statIcon="tv"
  emptyIcon="tv_off"
  i18nPrefix="consolesPage"
  [resolveModelName]="resolveModelName.bind(this)"
  [resolveBrandName]="resolveBrandName.bind(this)"
  [resolveStoreName]="resolveStoreName.bind(this)"
  [cardHeaderTpl]="cardHeaderTpl"
  [cardChipsTpl]="cardChipsTpl"
  (searchChange)="searchQuery.set($event)"
  (addClick)="onAdd()"
  (detailClick)="onDetail($any($event))">
</app-hardware-list-shell>

<ng-template #cardHeaderTpl let-console>
  @if (resolveCategory(console.modelId) === 'portable') {
    <span class="hw-list__card-icon hw-list__card-icon--handheld" aria-hidden="true"></span>
  } @else {
    <span class="hw-list__card-icon hw-list__card-icon--home" aria-hidden="true"></span>
  }
</ng-template>

<ng-template #cardChipsTpl let-console>
  <retro-chip
    [label]="
      (console.condition === GAME_CONDITION.NEW ? 'consolesPage.condition.new' : 'consolesPage.condition.used')
        | transloco
    "
    [color]="console.condition === GAME_CONDITION.NEW ? 'green' : 'neutral'" />
  @if (console.region) {
    <retro-chip [label]="console.region" color="neutral" />
  }
</ng-template>
