name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Unit tests + cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias
        run: npm ci --no-audit --no-fund

      - name: Generar environment.ts
        run: |
          cat > src/environments/environment.ts << 'EOF'
          export const environment = {
            production: false,
            supabase: {
              url: '${{ secrets.SUPABASE_URL }}',
              anonKey: '${{ secrets.SUPABASE_ANON_KEY }}'
            },
            rawg: {
              apiUrl: 'https://api.rawg.io/api',
              apiKey: '${{ secrets.RAWG_API_KEY }}'
            }
          };
          EOF

      - name: Build de producción
        run: npm run build

      - name: Ejecutar tests de reglas ESLint
        run: npm run test:eslint-rules

      - name: Ejecutar tests con cobertura
        run: npx ng test --configuration=coverage
