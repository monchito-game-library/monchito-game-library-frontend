<!-- Stats: projected from parent -->
<div class="list-page-header__stats">
  <ng-content />
</div>

<!-- Search and actions -->
<div class="list-page-header__filters">
  <retro-input
    class="list-page-header__search"
    [placeholder]="searchPlaceholder() | transloco"
    [ngModel]="searchValue()"
    [disabled]="disabled()"
    prefixText="$ "
    size="md"
    [hideSubscript]="true"
    (ngModelChange)="searchChange.emit($event)" />

  @if (showViewModeBtn()) {
    <retro-icon-button
      class="list-page-header__view-btn"
      [icon]="viewMode() === 'grid' ? 'view_list' : 'view_module'"
      [ariaLabel]="'gameList.aria.toggleViewMode' | transloco"
      [disabled]="disabled()"
      (clicked)="viewModeToggle.emit()" />
  }

  @if (showFilterBtn()) {
    <div class="list-page-header__filter-wrap">
      <retro-icon-button
        class="list-page-header__filter-btn"
        icon="tune"
        [ariaLabel]="'gameList.filters.filters' | transloco"
        [disabled]="disabled()"
        (clicked)="filterClick.emit()" />
      @if (filterCount() > 0) {
        <span class="list-page-header__filter-badge">{{ filterCount() }}</span>
      }
    </div>
  }

  @if (showAddBtn()) {
    <retro-button
      class="list-page-header__add-btn"
      variant="primary"
      size="md"
      [label]="'nav.add' | transloco"
      [disabled]="disabled()"
      (clicked)="addClick.emit()">
      <retro-icon slot="start" name="add" size="sm" />
    </retro-button>
  }
</div>

@if (commandPath()) {
  <retro-command-bar [path]="commandPath()" [flags]="commandFlags()" />
}
