<span class="lib-chip lib-chip--{{ color() }}" [class.lib-chip--filled]="filled()">
  @if (icon()) {
    <retro-icon class="lib-chip__icon" [name]="icon()!" />
  }
  <span class="lib-chip__label">{{ label() }}</span>
  @if (closable()) {
    <button
      class="lib-chip__close"
      type="button"
      aria-label="Eliminar filtro"
      (click)="closed.emit(); $event.stopPropagation()">
      <retro-icon class="lib-chip__close-icon" name="close" />
    </button>
  }
</span>
