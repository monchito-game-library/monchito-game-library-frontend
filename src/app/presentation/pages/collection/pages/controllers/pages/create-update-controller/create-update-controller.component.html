<app-hardware-form-shell
  [loading]="loading()"
  [saving]="saving()"
  [isEditMode]="isEditMode()"
  i18nPrefix="controllerPage"
  [brands]="brands()"
  [models]="models()"
  [editions]="editions()"
  [filteredBrands]="filteredBrands()"
  [filteredModels]="filteredModels()"
  [filteredStores]="filteredStores()"
  [form]="form"
  [displayBrandLabel]="displayBrandLabel"
  [displayModelLabel]="displayModelLabel"
  [displayStoreLabel]="displayStoreLabel"
  [extraFieldsTpl]="extraFieldsTpl"
  (cancelClick)="onCancel()"
  (submitClick)="onSubmit()"
  (brandChange)="onBrandChange($event)"
  (modelChange)="onModelChange($event)">
</app-hardware-form-shell>

<ng-template #extraFieldsTpl>
  <div class="hw-form__color-field">
    <label class="hw-form__color-label">{{ 'controllerPage.color' | transloco }}</label>
    <div class="hw-form__color-wrapper">
      <input type="color" [formControl]="form.controls.color" class="hw-form__color-input" />
      <span class="hw-form__color-preview" [style.background-color]="form.controls.color.value"></span>
    </div>
  </div>

  <retro-form-field>
    <retro-label>{{ 'controllerPage.compatibility' | transloco }}</retro-label>
    <retro-select [formControl]="form.controls.compatibility">
      @for (compat of availableCompatibilities; track compat.code) {
        <retro-option [value]="compat.code">{{ compat.labelKey | transloco }}</retro-option>
      }
    </retro-select>
  </retro-form-field>
</ng-template>
