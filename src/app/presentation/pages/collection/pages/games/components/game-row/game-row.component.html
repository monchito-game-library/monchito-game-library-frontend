<button type="button" class="game-row" (click)="onOpen()">
  <!-- Cover thumbnail -->
  <div class="game-row__cover">
    <img [ngSrc]="cover()" fill alt="Game cover" />
    @if (game().format === 'digital') {
      <span class="game-row__digital-badge" matTooltip="Digital">
        <mat-icon>cloud</mat-icon>
      </span>
    }
  </div>

  <!-- Title + edition -->
  <div class="game-row__title-block">
    <span class="game-row__title">{{ game().title }}</span>
    @if (game().edition) {
      <span class="game-row__edition">{{ game().edition }}</span>
    }
  </div>

  <!-- Platform badge -->
  <div class="game-row__platform">
    @if (game().platform) {
      <app-badge-chip [label]="game().platform!" variant="neutral" [bgColor]="platformColor()" />
    }
  </div>

  <!-- Meta wrapper — display: contents on desktop (children act as direct grid
       items, layout unchanged); flex row on mobile so status, indicators and price
       share the second row of the new two-row layout. -->
  <div class="game-row__meta">
    <div class="game-row__status">
      @if (gameStatus(); as status) {
        <span class="game-row__status-pill" [matTooltip]="status.labelKey | transloco">
          <mat-icon [style.color]="status.color">{{ status.icon }}</mat-icon>
        </span>
      }
    </div>

    <div class="game-row__rating">
      @if (game().personalRating !== null) {
        @for (i of [1, 2, 3, 4, 5]; track i) {
          <mat-icon [class.game-row__star--filled]="i <= ratingStars()">
            {{ i <= ratingStars() ? 'star' : 'star_border' }}
          </mat-icon>
        }
      }
    </div>

    <div class="game-row__indicators">
      @if (game().isFavorite) {
        <mat-icon class="game-row__indicator game-row__indicator--favorite" matTooltip="Favorito">favorite</mat-icon>
      }
      @if (game().activeLoanId !== null) {
        <mat-icon class="game-row__indicator game-row__indicator--loan" [matTooltip]="game().activeLoanTo ?? ''">
          handshake
        </mat-icon>
      }
      @if (game().forSale) {
        <mat-icon class="game-row__indicator game-row__indicator--sale" matTooltip="En venta">sell</mat-icon>
      }
    </div>

    <div class="game-row__price">
      @if (game().price !== null) {
        {{ game().price | currency: 'EUR' }}
      }
    </div>
  </div>

  <!-- Delete -->
  <button
    mat-icon-button
    type="button"
    class="game-row__delete"
    (click)="onDelete($event)"
    [attr.aria-label]="'gameCard.aria.delete' | transloco">
    <mat-icon>delete</mat-icon>
  </button>
</button>
