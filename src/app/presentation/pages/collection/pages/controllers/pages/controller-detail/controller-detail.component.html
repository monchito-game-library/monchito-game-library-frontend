<app-hardware-detail-shell
  [loading]="loading()"
  [showSaleForm]="showSaleForm()"
  [showLoanForm]="showLoanForm()"
  [deleting]="deleting()"
  [brand]="brand()"
  [model]="model()"
  [edition]="edition()"
  [item]="controller()"
  [forSale]="controller()?.forSale ?? false"
  [salePrice]="controller()?.salePrice ?? null"
  [soldAt]="controller()?.soldAt ?? null"
  [soldPriceFinal]="controller()?.soldPriceFinal ?? null"
  [price]="controller()?.price ?? null"
  [purchaseDate]="controller()?.purchaseDate ?? null"
  [storeLabel]="resolveStoreName(controller()?.store ?? null)"
  [notes]="controller()?.notes ?? null"
  [activeLoanId]="controller()?.activeLoanId ?? null"
  [activeLoanTo]="controller()?.activeLoanTo ?? null"
  itemType="controller"
  i18nPagePrefix="controllerDetailPage"
  i18nFieldPrefix="controllerPage"
  [saveFn]="saveFn"
  [sellFn]="sellFn"
  (backClicked)="onBack()"
  (editClicked)="onEdit()"
  (deleteClicked)="onDelete()"
  (openSaleClicked)="openSaleView()"
  (closeSaleClicked)="closeSaleView()"
  (openLoanClicked)="openLoanView()"
  (closeLoanClicked)="closeLoanView()"
  (saveCompleted)="onSaveCompleted($event)"
  (sellCompleted)="onSellCompleted()"
  (undoSaleClicked)="undoSell()"
  (loanSaved)="onLoanSaved($event)">
  <!-- hwChips: color swatch + compatibility + condition chips -->
  <ng-container hwChips>
    <div class="controller-detail__color-row">
      <div class="controller-detail__color-swatch" [style.background-color]="controller()?.color"></div>
      <span class="controller-detail__color-label">{{ controller()?.color }}</span>
    </div>
    <app-badge-chip [label]="controller()?.compatibility ?? ''" variant="neutral" />
    <app-badge-chip
      [label]="
        (controller()?.condition === GAME_CONDITION.NEW
          ? 'controllersPage.condition.new'
          : 'controllersPage.condition.used'
        ) | transloco
      "
      [variant]="controller()?.condition === GAME_CONDITION.NEW ? 'new' : 'used'" />
  </ng-container>
</app-hardware-detail-shell>
