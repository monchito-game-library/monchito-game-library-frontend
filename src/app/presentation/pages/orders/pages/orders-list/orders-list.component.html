<div class="orders-page">
  <div class="orders-page__header">
    <h1 class="orders-page__title">{{ 'orders.title' | transloco }}</h1>
  </div>

  @if (loading()) {
    <div class="orders-page__loading">
      <mat-progress-spinner mode="indeterminate" diameter="48" />
    </div>
  } @else if (orders().length === 0) {
    <div class="orders-page__empty">
      <svg class="orders-page__empty-svg" viewBox="0 0 150 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          class="es-ring"
          d="M12 18 H30 L50 88 H122 L138 42 H42"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round" />
        <circle class="es-accent" cx="60" cy="108" r="10" opacity="0.9" />
        <circle class="es-accent" cx="108" cy="108" r="10" opacity="0.9" />
        <line class="es-accent-stroke" x1="84" y1="52" x2="84" y2="78" stroke-width="3.5" stroke-linecap="round" />
        <line class="es-accent-stroke" x1="72" y1="65" x2="96" y2="65" stroke-width="3.5" stroke-linecap="round" />
      </svg>
      <p class="orders-page__empty-text">{{ 'orders.empty' | transloco }}</p>
    </div>
  } @else {
    <div class="orders-page__list">
      @for (order of orders(); track order.id; let i = $index) {
        <app-order-summary-card [order]="order" [style]="{ '--i': i }" (openOrder)="onOpenOrder($event)" />
      }
    </div>
  }

  <button mat-fab class="orders-page__fab" (click)="onCreateOrder()" [attr.aria-label]="'orders.create' | transloco">
    <mat-icon>add</mat-icon>
  </button>
</div>
