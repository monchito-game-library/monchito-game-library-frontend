<nav
  class="retro-router-tabs"
  [attr.aria-label]="ariaLabel() || null"
  [style.--ind-left.px]="indicatorLeft()"
  [style.--ind-width.px]="indicatorWidth()">
  @for (item of items(); track item.path) {
    <a
      #linkRef
      class="retro-router-tabs__link"
      [routerLink]="item.path"
      [routerLinkActiveOptions]="item.exact ? { exact: true } : {}"
      routerLinkActive
      #rla="routerLinkActive"
      [class.retro-router-tabs__link--active]="rla.isActive"
      [attr.aria-current]="rla.isActive ? 'page' : null">
      @if (item.icon) {
        <retro-icon [name]="item.icon" />
      }
      <span>{{ item.label | transloco }}</span>
    </a>
  }
  <span class="retro-router-tabs__indicator" aria-hidden="true"></span>
</nav>
<router-outlet />
