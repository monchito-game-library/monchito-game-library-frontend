<div class="retro-row" [class.retro-row--emphasized]="emphasized()">
  <dt class="retro-row__key">
    @if (icon()) {
      <retro-icon class="retro-row__icon" [name]="icon()!" />
    }
    <span>{{ label() }}</span>
  </dt>
  <span class="retro-row__dots" aria-hidden="true"></span>
  <dd class="retro-row__value">
    @if (value() !== null) {
      {{ value() }}
    } @else {
      <ng-content />
    }
  </dd>
</div>
