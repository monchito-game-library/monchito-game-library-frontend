<div class="games">
  <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="games__tabs">
    <a
      mat-tab-link
      routerLink="/collection"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive
      #rlaOverview="routerLinkActive"
      [active]="rlaOverview.isActive">
      <app-lib-icon name="home" />
      <span class="games__tab-label">{{ 'collectionOverview.tabOverview' | transloco }}</span>
    </a>

    <a
      mat-tab-link
      routerLink="/collection/games"
      routerLinkActive
      #rlaGames="routerLinkActive"
      [active]="rlaGames.isActive">
      <app-lib-icon name="sports_esports" />
      <span class="games__tab-label">{{ 'collectionOverview.tabGames' | transloco }}</span>
    </a>

    <a
      mat-tab-link
      routerLink="/collection/consoles"
      routerLinkActive
      #rlaConsoles="routerLinkActive"
      [active]="rlaConsoles.isActive">
      <app-lib-icon name="tv" />
      <span class="games__tab-label">{{ 'collectionOverview.tabConsoles' | transloco }}</span>
    </a>

    <a
      mat-tab-link
      routerLink="/collection/controllers"
      routerLinkActive
      #rlaControllers="routerLinkActive"
      [active]="rlaControllers.isActive">
      <app-lib-icon name="gamepad" />
      <span class="games__tab-label">{{ 'collectionOverview.tabControllers' | transloco }}</span>
    </a>
  </nav>

  <mat-tab-nav-panel #tabPanel class="games__content">
    <router-outlet />
  </mat-tab-nav-panel>
</div>
