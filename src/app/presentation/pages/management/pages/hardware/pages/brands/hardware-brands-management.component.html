<div class="brands-page" [class.brands-page--panel-open]="panelOpen()">
  <header class="brands-page__header">
    <div class="brands-page__header-left">
      <h1 class="brands-page__title">{{ 'management.hardware.title' | transloco }}</h1>
    </div>
    <retro-button
      [label]="'management.hardware.brands.addBtn' | transloco"
      variant="primary"
      [disabled]="loading()"
      (clicked)="onAddBrand()">
      <retro-icon slot="start" name="add" size="sm" />
    </retro-button>
  </header>

  @if (panelOpen()) {
    <div class="brands-edit-panel-wrapper">
      <app-hardware-brand-edit-panel
        [brand]="selectedBrand() ?? null"
        (saved)="onSaved($event)"
        (cancelled)="onClosePanel()"
        (deleted)="onDeleteBrand()" />
    </div>
  }

  <div class="brands-grid-wrapper">
    @if (loading()) {
      <div class="brands-skeleton">
        @for (n of [0, 1, 2, 3, 4, 5]; track n) {
          <div class="brands-skeleton__card">
            <retro-skeleton width="36px" height="36px" />
            <retro-skeleton width="60%" height="14px" />
          </div>
        }
      </div>
    } @else if (brands().length === 0) {
      <p class="brands-page__empty">{{ 'management.hardware.brands.empty' | transloco }}</p>
    } @else {
      <div class="brands-grid">
        @for (brand of brands(); track brand.id) {
          <retro-card
            class="brand-card"
            padding="sm"
            [interactive]="true"
            [selected]="selectedBrand()?.id === brand.id"
            (cardClicked)="onOpenModels(brand)">
            <div class="brand-card__top">
              <retro-icon name="memory" size="lg" />
              <span class="brand-card__name">{{ brand.name }}</span>
              <retro-icon name="chevron_right" size="sm" />
            </div>
          </retro-card>
        }
      </div>
    }
  </div>
</div>
