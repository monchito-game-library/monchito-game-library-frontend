<div retroDialogTitle>
  @if (isEditMode) {
    {{ 'orders.lines.dialogEditTitle' | transloco }}
  } @else {
    {{ 'orders.lines.dialogAddTitle' | transloco }}
  }
</div>

<div retroDialogContent>
  <form [formGroup]="form" class="add-edit-line-dialog__form">
    <retro-search
      class="add-edit-line-dialog__field"
      [label]="'orders.lines.productLabel' | transloco"
      [formControl]="form.controls.productId"
      [displayWith]="displayProductName"
      [error]="_getProductError()"
      (queryChange)="onProductQuery($event)">
      @for (product of filteredProducts(); track product.id) {
        <retro-option [value]="product.id">{{ product.name }} ({{ product.category }})</retro-option>
      }
    </retro-search>

    <retro-input
      class="add-edit-line-dialog__field"
      [label]="'orders.lines.qtyNeededLabel' | transloco"
      formControlName="quantityNeeded"
      type="number"
      min="1"
      [error]="
        form.controls.quantityNeeded.hasError('required') || form.controls.quantityNeeded.hasError('min')
          ? ('orders.lines.qtyNeededRequired' | transloco)
          : null
      " />

    <retro-textarea
      class="add-edit-line-dialog__field"
      [label]="'orders.lines.notesLabel' | transloco"
      formControlName="notes"
      [rows]="3" />
  </form>
</div>

<footer retroDialogActions align="end">
  <retro-button [label]="'orders.header.cancel' | transloco" variant="ghost" size="md" (clicked)="onCancel()" />
  <retro-button [label]="'orders.header.save' | transloco" variant="primary" size="md" (clicked)="onSubmit()">
    <retro-icon slot="start" name="save" size="sm" />
  </retro-button>
</footer>
