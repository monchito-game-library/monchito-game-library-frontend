<div class="hardware-loan-form">
  <!-- Header -->
  <div class="hardware-loan-form__header">
    <app-lib-icon-button
      icon="arrow_back"
      [ariaLabel]="'common.back' | transloco"
      class="hardware-loan-form__back-btn"
      (clicked)="onCancel()" />
    <h2 class="hardware-loan-form__title">{{ 'hardwareLoan.title' | transloco }}</h2>
  </div>

  @if (isLoaned()) {
    <!-- Return mode: active loan info -->
    <section class="hardware-loan-form__section">
      <app-lib-section-header [label]="'hardwareLoan.activeSection' | transloco" />

      <div class="hardware-loan-form__info-row">
        <app-lib-icon name="person" />
        <span>{{ item().activeLoanTo }}</span>
      </div>
      <div class="hardware-loan-form__info-row">
        <app-lib-icon name="calendar_today" />
        <span>{{ item().activeLoanAt }}</span>
      </div>

      <div class="hardware-loan-form__action-btn">
        <app-lib-button
          variant="primary"
          [icon]="returning() ? 'hourglass_empty' : 'undo'"
          [label]="'hardwareLoan.returnBtn' | transloco"
          [disabled]="returning()"
          [loading]="returning()"
          (clicked)="onReturn()" />
      </div>
    </section>
  } @else {
    <!-- Loan mode: create loan form -->
    <form [formGroup]="form" class="hardware-loan-form__content">
      <section class="hardware-loan-form__section">
        <app-lib-section-header [label]="'hardwareLoan.newSection' | transloco" />

        <mat-form-field appearance="outline" class="hardware-loan-form__field">
          <mat-label>{{ 'hardwareLoan.loanedTo' | transloco }}</mat-label>
          <input
            matInput
            type="text"
            formControlName="loanedTo"
            [placeholder]="'hardwareLoan.loanedToPlaceholder' | transloco" />
        </mat-form-field>

        <mat-form-field
          appearance="outline"
          class="hardware-loan-form__field"
          [appDatepickerFieldClick]="loanedAtPicker">
          <mat-label>{{ 'hardwareLoan.loanedAt' | transloco }}</mat-label>
          <input matInput [matDatepicker]="loanedAtPicker" formControlName="loanedAt" [readonly]="true" />
          <mat-datepicker-toggle matIconSuffix [for]="loanedAtPicker"></mat-datepicker-toggle>
          <mat-datepicker #loanedAtPicker></mat-datepicker>
        </mat-form-field>

        <div class="hardware-loan-form__action-btn">
          <app-lib-button
            variant="primary"
            [icon]="saving() ? 'hourglass_empty' : 'handshake'"
            [label]="'hardwareLoan.loanBtn' | transloco"
            [disabled]="saving()"
            [loading]="saving()"
            (clicked)="onLoan()" />
        </div>
      </section>
    </form>
  }
</div>
