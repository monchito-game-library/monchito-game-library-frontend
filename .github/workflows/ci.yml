name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Unit tests + cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests con cobertura
        run: npx ng test --configuration=coverage
