<app-hardware-list-shell
  [loading]="loading()"
  [items]="items()"
  [filteredItems]="filteredItems()"
  [totalSpent]="totalSpent()"
  [searchQuery]="searchQuery()"
  statIcon="gamepad"
  emptyIcon="gamepad"
  i18nPrefix="controllersPage"
  [resolveModelName]="resolveModelName.bind(this)"
  [resolveBrandName]="resolveBrandName.bind(this)"
  [resolveStoreName]="resolveStoreName.bind(this)"
  [cardHeaderTpl]="cardHeaderTpl"
  [cardChipsTpl]="cardChipsTpl"
  (searchChange)="searchQuery.set($event)"
  (addClick)="onAdd()"
  (detailClick)="onDetail($any($event))">
</app-hardware-list-shell>

<ng-template #cardHeaderTpl let-controller>
  <div class="hw-list__card-color" [style.background-color]="controller.color"></div>
</ng-template>

<ng-template #cardChipsTpl let-controller>
  <span class="hw-list__chip hw-list__chip--neutral">{{ controller.compatibility }}</span>
  <span
    class="hw-list__chip"
    [class.hw-list__chip--new]="controller.condition === GAME_CONDITION.NEW"
    [class.hw-list__chip--used]="controller.condition !== GAME_CONDITION.NEW">
    {{
      (controller.condition === GAME_CONDITION.NEW ? 'controllersPage.condition.new' : 'controllersPage.condition.used')
        | transloco
    }}
  </span>
</ng-template>
