<div
  class="retro-segmented"
  role="radiogroup"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-disabled]="disabled() || null"
>
  @for (option of options(); track option.value; let i = $index) {
    <button
      #segmentRef
      type="button"
      role="radio"
      class="retro-segmented-segment"
      [class.retro-segmented-segment--active]="option.value === value()"
      [attr.aria-checked]="option.value === value()"
      [attr.tabindex]="(option.value === value() || (value() === undefined && i === 0)) ? 0 : -1"
      [disabled]="disabled()"
      (click)="onSelect(option.value)"
      (keydown)="onKeydown($event, i)"
    >
      @if (option.icon) {
        <span class="retro-segmented-segment__icon material-icons">{{ option.icon }}</span>
      }
      <span class="retro-segmented-segment__label">{{ option.label }}</span>
    </button>
  }
</div>
