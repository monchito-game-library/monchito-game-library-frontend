<div class="collection-overview">
  <div class="collection-overview__header">
    <span class="collection-overview__header-prefix" aria-hidden="true">&gt;</span>
    <h1 class="collection-overview__title">{{ 'collectionOverview.title' | transloco }}</h1>
  </div>

  <div class="collection-overview__total-banner">
    <span class="collection-overview__total-label">{{ 'collectionOverview.totalSpent' | transloco }}</span>
    <span class="collection-overview__total-amount">
      @if (collectionTotalSpent() === null) {
        <app-lib-skeleton width="120px" height="2rem" />
      } @else {
        {{ collectionTotalSpent() | currency: 'EUR' : 'symbol' : '1.2-2' }}
      }
    </span>
  </div>

  <div class="collection-overview__grid">
    <!-- Games -->
    <button class="collection-overview__card" (click)="goToGames()">
      <mat-icon class="collection-overview__card-icon">sports_esports</mat-icon>
      <app-lib-section-header [label]="'collectionOverview.games.title' | transloco" />
      <p class="collection-overview__card-subtitle">{{ 'collectionOverview.games.subtitle' | transloco }}</p>
      <div class="collection-overview__card-data">
        <app-lib-data-row label="ITEMS" icon="tag">
          @if (gamesCount() === null) {
            <app-lib-skeleton width="80px" height="1rem" />
          } @else if (gamesCount() === 1) {
            {{ 'collectionOverview.oneItem' | transloco }}
          } @else {
            {{ 'collectionOverview.items' | transloco: { count: gamesCount() } }}
          }
        </app-lib-data-row>
        <app-lib-data-row label="TOTAL" icon="payments">
          @if (gamesTotalSpent() === null) {
            <app-lib-skeleton width="60px" height="0.875rem" />
          } @else {
            {{ gamesTotalSpent() | currency: 'EUR' : 'symbol' : '1.2-2' }}
          }
        </app-lib-data-row>
      </div>
    </button>

    <!-- Consoles -->
    <button class="collection-overview__card" (click)="goToConsoles()">
      <mat-icon class="collection-overview__card-icon">tv</mat-icon>
      <app-lib-section-header [label]="'collectionOverview.consolesCategory.title' | transloco" />
      <p class="collection-overview__card-subtitle">{{ 'collectionOverview.consolesCategory.subtitle' | transloco }}</p>
      <div class="collection-overview__card-data">
        <app-lib-data-row label="ITEMS" icon="tag">
          @if (consolesCount() === null) {
            <app-lib-skeleton width="80px" height="1rem" />
          } @else if (consolesCount() === 1) {
            {{ 'collectionOverview.oneItem' | transloco }}
          } @else {
            {{ 'collectionOverview.items' | transloco: { count: consolesCount() } }}
          }
        </app-lib-data-row>
        <app-lib-data-row label="TOTAL" icon="payments">
          @if (consolesTotalSpent() === null) {
            <app-lib-skeleton width="60px" height="0.875rem" />
          } @else {
            {{ consolesTotalSpent() | currency: 'EUR' : 'symbol' : '1.2-2' }}
          }
        </app-lib-data-row>
      </div>
    </button>

    <!-- Controllers -->
    <button class="collection-overview__card" (click)="goToControllers()">
      <mat-icon class="collection-overview__card-icon">gamepad</mat-icon>
      <app-lib-section-header [label]="'collectionOverview.controllers.title' | transloco" />
      <p class="collection-overview__card-subtitle">{{ 'collectionOverview.controllers.subtitle' | transloco }}</p>
      <div class="collection-overview__card-data">
        <app-lib-data-row label="ITEMS" icon="tag">
          @if (controllersCount() === null) {
            <app-lib-skeleton width="80px" height="1rem" />
          } @else if (controllersCount() === 1) {
            {{ 'collectionOverview.oneItem' | transloco }}
          } @else {
            {{ 'collectionOverview.items' | transloco: { count: controllersCount() } }}
          }
        </app-lib-data-row>
        <app-lib-data-row label="TOTAL" icon="payments">
          @if (controllersTotalSpent() === null) {
            <app-lib-skeleton width="60px" height="0.875rem" />
          } @else {
            {{ controllersTotalSpent() | currency: 'EUR' : 'symbol' : '1.2-2' }}
          }
        </app-lib-data-row>
      </div>
    </button>
  </div>
</div>
