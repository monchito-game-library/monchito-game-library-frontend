<div class="stores-page" [class.stores-page--panel-open]="panelOpen()">
  <header class="stores-page__header">
    <h1 class="stores-page__title">{{ 'management.stores.title' | transloco }}</h1>
    <button mat-flat-button color="primary" (click)="onAddStore()" [disabled]="loading()">
      <mat-icon>add</mat-icon>
      {{ 'management.stores.addBtn' | transloco }}
    </button>
  </header>

  @if (panelOpen()) {
    <div class="stores-edit-panel-wrapper">
      <app-store-edit-panel
        [store]="selectedStore() ?? null"
        (saved)="onSaved($event)"
        (cancelled)="onClosePanel()"
        (deleted)="onDeleteStore()" />
    </div>
  }

  <div class="stores-grid-wrapper">
    @if (loading()) {
      <div class="stores-page__loading">
        <mat-spinner diameter="40" />
      </div>
    } @else if (stores().length === 0) {
      <p class="stores-page__empty">{{ 'management.stores.emptyCustom' | transloco }}</p>
    } @else {
      <div class="stores-grid">
        @for (store of stores(); track store.id) {
          <app-catalog-item-card
            icon="storefront"
            [name]="store.label"
            [chips]="store.formatHint ? [getFormatHintLabel(store.formatHint)] : []"
            [selected]="selectedStore()?.id === store.id"
            (cardClick)="onSelectStore(store)" />
        }
      </div>
    }
  </div>
</div>
