<div class="order-create-page">
  <div class="order-create-page__header">
    <retro-button
      [label]="'orders.backToList' | transloco"
      variant="ghost"
      class="order-create-page__back-btn"
      routerLink="/orders">
      <retro-icon slot="start" name="arrow_back" size="sm" />
    </retro-button>
    <h1 class="order-create-page__title">{{ 'orders.create' | transloco }}</h1>
  </div>

  <div class="order-create-page__card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="order-create-page__form">
      <retro-input
        class="order-create-page__field"
        [label]="'orders.header.title' | transloco"
        formControlName="title"
        [placeholder]="'orders.header.titlePlaceholder' | transloco"
        [error]="form.controls.title.hasError('required') ? ('orders.header.titleRequired' | transloco) : null" />

      <retro-form-field class="order-create-page__field">
        <retro-label>{{ 'orders.header.notes' | transloco }}</retro-label>
        <textarea
          retroInput
          formControlName="notes"
          [placeholder]="'orders.header.notesPlaceholder' | transloco"
          rows="4"></textarea>
      </retro-form-field>

      <div class="order-create-page__actions">
        <retro-button [label]="'orders.header.cancel' | transloco" variant="ghost" routerLink="/orders" />
        <retro-button
          [label]="'orders.header.save' | transloco"
          variant="primary"
          type="submit"
          [loading]="saving()"
          [disabled]="form.invalid || saving()" />
      </div>
    </form>
  </div>
</div>
