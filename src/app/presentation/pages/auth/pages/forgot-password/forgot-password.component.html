<app-auth-panel>
  <h2 class="auth-panel__title">{{ 'auth.forgotPassword.title' | transloco }}</h2>
  <p class="auth-panel__description">{{ 'auth.forgotPassword.description' | transloco }}</p>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="auth-form">
    <!-- Email -->
    <retro-input
      class="full-width"
      [label]="'auth.forgotPassword.email' | transloco"
      prefixIcon="email"
      type="email"
      formControlName="email"
      [placeholder]="'auth.forgotPassword.emailPlaceholder' | transloco"
      autocomplete="email"
      [error]="_getEmailError()" />

    <!-- Error -->
    @if (errorMessage()) {
      <div class="auth-message auth-message--error">
        <retro-icon name="error_outline" />
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <!-- Success -->
    @if (successMessage()) {
      <div class="auth-message auth-message--success">
        <retro-icon name="check_circle_outline" />
        <span>{{ successMessage() }}</span>
      </div>
    }

    <!-- Submit -->
    <retro-button
      [label]="'auth.forgotPassword.submit' | transloco"
      variant="primary"
      type="submit"
      [fullWidth]="true"
      [loading]="loading()"
      [disabled]="loading()" />

    <!-- Back to login -->
    <div class="auth-prompt">
      <a routerLink="/auth/login" class="auth-link">{{ 'auth.forgotPassword.backToLogin' | transloco }}</a>
    </div>
  </form>
</app-auth-panel>
