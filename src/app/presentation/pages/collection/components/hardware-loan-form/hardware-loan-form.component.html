<div class="hardware-loan-form">
  <!-- Header -->
  <div class="hardware-loan-form__header">
    <retro-icon-button
      icon="arrow_back"
      [ariaLabel]="'common.back' | transloco"
      class="hardware-loan-form__back-btn"
      (clicked)="onCancel()" />
    <h2 class="hardware-loan-form__title">{{ 'hardwareLoan.title' | transloco }}</h2>
  </div>

  @if (isLoaned()) {
    <!-- Return mode: active loan info -->
    <section class="hardware-loan-form__section">
      <retro-section-header [label]="'hardwareLoan.activeSection' | transloco" />

      <div class="hardware-loan-form__info-row">
        <retro-icon name="person" />
        <span>{{ item().activeLoanTo }}</span>
      </div>
      <div class="hardware-loan-form__info-row">
        <retro-icon name="calendar_today" />
        <span>{{ item().activeLoanAt }}</span>
      </div>

      <div class="hardware-loan-form__action-btn">
        <retro-button
          variant="primary"
          [icon]="returning() ? 'hourglass_empty' : 'undo'"
          [label]="'hardwareLoan.returnBtn' | transloco"
          [disabled]="returning()"
          [loading]="returning()"
          (clicked)="onReturn()" />
      </div>
    </section>
  } @else {
    <!-- Loan mode: create loan form -->
    <form [formGroup]="form" class="hardware-loan-form__content">
      <section class="hardware-loan-form__section">
        <retro-section-header [label]="'hardwareLoan.newSection' | transloco" />

        <retro-form-field class="hardware-loan-form__field">
          <retro-label>{{ 'hardwareLoan.loanedTo' | transloco }}</retro-label>
          <input
            retroInput
            type="text"
            formControlName="loanedTo"
            [placeholder]="'hardwareLoan.loanedToPlaceholder' | transloco" />
        </retro-form-field>

        <retro-form-field class="hardware-loan-form__field">
          <retro-label>{{ 'hardwareLoan.loanedAt' | transloco }}</retro-label>
          <input retroInput [retroDatepicker]="loanedAtPicker" formControlName="loanedAt" [readonly]="true" />
          <retro-icon retroSuffix [retroDatepickerToggle]="loanedAtPicker" name="calendar_today" />
          <retro-datepicker #loanedAtPicker />
        </retro-form-field>

        <div class="hardware-loan-form__action-btn">
          <retro-button
            variant="primary"
            [icon]="saving() ? 'hourglass_empty' : 'handshake'"
            [label]="'hardwareLoan.loanBtn' | transloco"
            [disabled]="saving()"
            [loading]="saving()"
            (clicked)="onLoan()" />
        </div>
      </section>
    </form>
  }
</div>
